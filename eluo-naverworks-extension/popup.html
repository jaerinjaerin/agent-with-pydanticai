<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #333;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .status.connected {
      background: #d4edda;
      color: #155724;
    }
    .status.disconnected {
      background: #f8d7da;
      color: #721c24;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status.connected .status-dot { background: #28a745; }
    .status.disconnected .status-dot { background: #dc3545; }
    .data-section {
      background: #f8f9fa;
      border-radius: 6px;
      padding: 10px;
    }
    .data-section h3 {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
    }
    .data-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      font-size: 12px;
    }
    .data-row .label { color: #888; }
    .data-row .value { font-weight: 500; }
    .empty { color: #aaa; font-style: italic; font-size: 12px; }
    .timestamp { color: #aaa; font-size: 11px; margin-top: 6px; text-align: right; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Eluo 비용처리</h1>
  </div>

  <div id="status" class="status disconnected">
    <span class="status-dot"></span>
    <span id="status-text">연결 대기 중</span>
  </div>

  <div class="data-section">
    <h3>마지막 전달 데이터</h3>
    <div id="data-content">
      <span class="empty">아직 전달된 데이터가 없습니다</span>
    </div>
    <div id="data-timestamp" class="timestamp"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
